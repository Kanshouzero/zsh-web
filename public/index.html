<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>zsh-web</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
<style>
  :root {
    --glass: rgba(255,255,255,.04);
    --glass-hi: rgba(255,255,255,.07);
    --stroke: rgba(255,255,255,.08);
    --stroke-hi: rgba(255,255,255,.14);
    --hilite: inset 0 1px 0 rgba(255,255,255,.07);
    --accent: #3ddc84;
    --txt: #e7e9ee;
    --txt-dim: #8b909b;
    --radius: 13px;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; height: 100dvh; color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "PingFang SC", sans-serif;
    background: #090b10; }
  body { position: fixed; inset: 0; overflow: hidden; }
  /* 氛围光 — 给毛玻璃提供可模糊的彩色内容 */
  body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(42% 50% at 12% 8%,  rgba(72,116,255,.10), transparent 70%),
      radial-gradient(44% 46% at 88% 16%, rgba(61,220,160,.06), transparent 70%),
      radial-gradient(50% 52% at 74% 96%, rgba(150,92,255,.08), transparent 72%),
      radial-gradient(40% 40% at 30% 100%, rgba(255,128,170,.04), transparent 70%); }
  #app { position: fixed; top: 0; left: 0; width: 100%; z-index: 1; display: flex;
    height: 100%; height: 100dvh; transform-origin: 0 0; }

  /* 毛玻璃侧栏 */
  #side { width: 252px; flex: 0 0 252px; display: flex; flex-direction: column;
    background: rgba(18,20,27,.55);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    backdrop-filter: blur(28px) saturate(180%);
    border-right: 1px solid var(--stroke);
    box-shadow: var(--hilite), 1px 0 24px rgba(0,0,0,.35); }
  #side header { padding: 13px 16px; font-weight: 700; font-size: 12.5px; letter-spacing: .3px;
    color: #f1f3f6; border-bottom: 1px solid rgba(255,255,255,.06);
    display: flex; justify-content: space-between; align-items: center; }
  #who { font-size: 11px; color: var(--txt-dim); font-weight: 400; }

  /* 卡片式列表 */
  #machines { flex: 0 0 auto; max-height: 26%; overflow: auto; padding: 7px 8px;
    border-bottom: 1px solid rgba(255,255,255,.06); }
  #list { flex: 1; overflow: auto; padding: 7px 8px; }
  .item { padding: 10px 12px; margin: 5px 0; cursor: pointer; font-size: 13px;
    border-radius: var(--radius); background: var(--glass);
    border: 1px solid var(--stroke); box-shadow: var(--hilite);
    transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease; }
  .item:hover { background: var(--glass-hi); border-color: var(--stroke-hi); transform: translateY(-1px); }
  .item.active, .item.sel {
    background: linear-gradient(rgba(61,220,132,.11), rgba(61,220,132,.04));
    border-color: rgba(61,220,132,.24);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 3px 10px rgba(0,0,0,.22); }
  .item .meta { color: var(--txt-dim); font-size: 11px; margin-top: 4px; }
  .item .kill { float: right; color: #f0716e; opacity: .5; transition: opacity .15s; }
  .item .kill:hover { opacity: 1; }
  .item .ren { float: right; margin-right: 10px; color: var(--txt-dim); opacity: .5; transition: opacity .15s; }
  .item .ren:hover { opacity: 1; }

  /* 玻璃按钮 */
  #side .actions { padding: 12px; border-top: 1px solid rgba(255,255,255,.06); display: flex; gap: 9px; }
  .ver { padding: 0 12px 10px; text-align: center; color: var(--txt-dim); font-size: 10px; opacity: .55; user-select: text; }
  button { padding: 10px 12px; border: 0; border-radius: 12px; font: inherit; font-weight: 600;
    cursor: pointer; transition: transform .16s ease, box-shadow .16s ease, background .16s ease; }
  .new { flex: 1; color: #e9fff4;
    background: linear-gradient(180deg, #33a266, #25814c);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 3px 10px rgba(0,0,0,.28); }
  .new:hover { transform: translateY(-1px); background: linear-gradient(180deg, #39ad6f, #298c54);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 5px 14px rgba(0,0,0,.32); }
  .logout { color: #ccd1d9; background: rgba(255,255,255,.06);
    border: 1px solid var(--stroke); box-shadow: var(--hilite); }
  .logout:hover { background: rgba(255,255,255,.11); }

  /* 终端区 */
  #main { flex: 1; position: relative; background: rgba(8,10,14,.55); }
  #term { position: absolute; inset: 0; padding: 12px; box-sizing: border-box; }
  #empty { position: absolute; inset: 0; display: grid; place-items: center; color: #565c66; font-size: 13px; }

  /* 玻璃状态胶囊 */
  #status { position: absolute; top: 12px; right: 16px; z-index: 5; font-size: 12px; font-weight: 600;
    color: var(--txt-dim); padding: 6px 13px; border-radius: 20px;
    background: rgba(28,30,38,.6);
    -webkit-backdrop-filter: blur(14px) saturate(180%); backdrop-filter: blur(14px) saturate(180%);
    border: 1px solid var(--stroke);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 3px 12px rgba(0,0,0,.35); }
  #status.ok  { color: #74eaab; border-color: rgba(116,234,171,.26); box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 3px 12px rgba(0,0,0,.35); }
  #status.bad { color: #f29292; border-color: rgba(242,146,146,.26); box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 3px 12px rgba(0,0,0,.35); }

  /* 用量常驻区 */
  #usage { border-top: 1px solid rgba(255,255,255,.06); flex: 0 0 auto; max-height: 44%; overflow: auto; }
  #usage header { padding: 11px 16px; font-size: 12.5px; font-weight: 700; color: #f1f3f6;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 2;
    background: rgba(18,20,27,.72);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,.06); }
  #usage .refresh { cursor: pointer; color: var(--txt-dim); font-weight: 400; user-select: none; font-size: 14px; transition: color .15s, transform .3s; }
  #usage .refresh:hover { color: var(--txt); transform: rotate(90deg); }
  #usage .empty, #machines .empty, #list .empty { padding: 14px; color: #565c66; font-size: 11.5px; text-align: center; }

  #machines .item .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; background: #555;
    box-shadow: 0 0 0 1px rgba(255,255,255,.08); vertical-align: middle; }
  #machines .item.online .dot { background: var(--accent); box-shadow: 0 0 4px rgba(61,220,132,.4), 0 0 0 1px rgba(61,220,132,.22); }

  .addMachine, .addAcct { cursor: pointer; color: var(--accent); font-weight: 700; user-select: none; font-size: 11.5px;
    padding: 3px 8px; border-radius: 8px; background: rgba(61,220,132,.1); border: 1px solid rgba(61,220,132,.2); transition: background .15s; }
  .addMachine:hover, .addAcct:hover { background: rgba(61,220,132,.2); }

  .acct { padding: 11px 12px; margin: 6px 8px; border-radius: var(--radius);
    background: var(--glass); border: 1px solid var(--stroke); box-shadow: var(--hilite); }
  .acct .nm { font-size: 12.5px; font-weight: 600; display: flex; justify-content: space-between; gap: 6px; align-items: center; }
  .acct .del { cursor: pointer; color: #f0716e; opacity: .5; font-size: 11px; margin-left: 7px; transition: opacity .15s; }
  .acct .del:hover { opacity: 1; }
  .acct .ren { cursor: pointer; color: var(--txt-dim); opacity: .5; font-size: 11px; margin-left: 7px; transition: opacity .15s, color .15s; }
  .acct .ren:hover { opacity: 1; color: var(--accent); }
  .acct .warn { color: #f0716e; font-size: 10px; white-space: nowrap; font-weight: 400; }
  .acct .plan { color: #74b4f0; font-size: 9px; border: 1px solid rgba(116,180,240,.3); background: rgba(116,180,240,.1);
    border-radius: 5px; padding: 1px 5px; vertical-align: middle; }

  .bar { display: flex; align-items: center; gap: 7px; margin-top: 6px; font-size: 10px; color: var(--txt-dim); }
  .bar .lbl { flex: 0 0 18px; }
  .bar .track { flex: 1; height: 7px; border-radius: 4px; background: rgba(0,0,0,.35); overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.04); }
  .bar .fill { display: block; height: 100%; border-radius: 4px; transition: width .4s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.35); }
  .bar .pct { flex: 0 0 32px; text-align: right; font-variant-numeric: tabular-nums; }
  .bar .rst { flex: 0 0 auto; min-width: 42px; text-align: right; font-variant-numeric: tabular-nums; opacity: .65; }

  /* 细滚动条 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.22); background-clip: content-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* 汉堡 / 遮罩:仅移动端可见 */
  #menuBtn { display: none; position: absolute; top: 10px; left: 12px; z-index: 6;
    width: 38px; height: 34px; padding: 0; border-radius: 11px; line-height: 34px; text-align: center;
    font-size: 17px; color: var(--txt);
    background: rgba(28,30,38,.6);
    -webkit-backdrop-filter: blur(14px) saturate(180%); backdrop-filter: blur(14px) saturate(180%);
    border: 1px solid var(--stroke); box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 3px 12px rgba(0,0,0,.35); }
  #scrim { display: none; position: fixed; inset: 0; z-index: 20; background: rgba(0,0,0,.5);
    opacity: 0; transition: opacity .22s ease; }
  #scrim.show { opacity: 1; }

  /* 移动端快捷键条:贴在终端底部(键盘上方),给手机软键盘补上缺失的键 */
  #keybar { display: none; position: absolute; left: 0; right: 0; bottom: 0; z-index: 7;
    height: 46px; align-items: center; gap: 7px; padding: 0 9px; box-sizing: border-box;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: rgba(14,16,22,.97);
    -webkit-backdrop-filter: blur(16px) saturate(180%); backdrop-filter: blur(16px) saturate(180%);
    border-top: 1px solid var(--stroke-hi); }
  #keybar button { flex: 0 0 auto; padding: 7px 15px; border-radius: 10px; font-size: 13px;
    color: var(--txt); background: rgba(255,255,255,.07); border: 1px solid var(--stroke);
    box-shadow: var(--hilite); }
  #keybar button:active { background: rgba(61,220,132,.2); border-color: rgba(61,220,132,.32); transform: translateY(1px); }

  @media (max-width: 760px) {
    /* 终端打开时露出快捷键条,并给它让出底部空间(#app 的高度由 JS 跟随可视视口) */
    body.term-open #keybar { display: flex; }
    /* 终端打开:让出键盘条空间;并把顶部那 52px(给汉堡留的)内边距收回来当终端行用,
       汉堡改为浮在左上角 —— 多腾出约 2-3 行,确保 claude 底部 auto 模式行能露出。 */
    body.term-open #term { bottom: 58px; padding-top: 12px; }
    /* 侧栏改抽屉:默认滑出屏外,.open 时滑入 */
    #side { position: fixed; left: 0; top: 0; bottom: 0; z-index: 30;
      width: 84vw; max-width: 320px; flex-basis: auto;
      transform: translateX(-100%); transition: transform .24s ease;
      box-shadow: 1px 0 32px rgba(0,0,0,.6); }
    #side.open { transform: translateX(0); }
    #scrim.show { display: block; }
    #menuBtn { display: block; }
    /* 给汉堡让位:空提示和终端内边距上移一点 */
    #term { padding-top: 52px; }
    #empty { padding-top: 52px; }
    /* 用量区在小屏少占点高度 */
    #machines { max-height: 30%; }
    #usage { max-height: 38%; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="side">
    <header>机器 <span class="addMachine" id="addMachine" title="添加机器">+ 添加</span></header>
    <div id="machines"><div class="empty">加载中…</div></div>
    <header>会话 <span id="who"></span></header>
    <div id="list"><div class="empty">← 先选一台机器</div></div>
    <div id="usage">
      <header>用量 <span><span class="addAcct" id="addAcct" title="添加账号">+ 账号</span> &nbsp; <span class="refresh" id="usageRefresh" title="刷新">⟳</span></span></header>
      <div id="usageList"><div class="empty">加载中…</div></div>
    </div>
    <div class="actions">
      <button class="new" id="new">+ 新建</button>
      <button class="logout" id="logout">退出</button>
    </div>
    <div class="ver" id="ver"></div>
  </div>
  <div id="main">
    <button id="menuBtn" title="菜单">☰</button>
    <div id="status">空闲</div>
    <div id="empty">选择或新建一个会话</div>
    <div id="term" style="display:none"></div>
    <div id="keybar">
      <button data-k="esc">Esc</button>
      <button data-k="tab">Tab</button>
      <button data-k="stab">⇧Tab</button>
      <button data-k="paste">粘贴</button>
    </div>
  </div>
  <div id="scrim"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-canvas@0.7.0/lib/addon-canvas.js"></script>
<script>
const $ = (s) => document.querySelector(s);
// Build stamp: replaced by deploy when available; otherwise fall back to this file's timestamp.
{ const v = '__VER__'; const el = $('#ver'); if (el) el.textContent = '版本 ' + (v.charAt(0) === '_' ? document.lastModified : v); }
const status = $('#status');
const setStatus = (t, c) => { status.textContent = t; status.className = c || ''; };

// --- 移动端侧栏抽屉 ---------------------------------------------------------
const isMobile = () => window.matchMedia('(max-width: 760px)').matches;
const openDrawer  = () => { $('#side').classList.add('open'); $('#scrim').classList.add('show'); };
const closeDrawer = () => { $('#side').classList.remove('open'); $('#scrim').classList.remove('show'); };
const toggleDrawer = () => ($('#side').classList.contains('open') ? closeDrawer() : openDrawer());
$('#menuBtn').addEventListener('click', toggleDrawer);
$('#scrim').addEventListener('click', closeDrawer);

// --- 键盘弹出时同步可视高度 -------------------------------------------------
// 手机软键盘弹出后,visualViewport 变矮但布局视口不变 —— 内容被顶上去、底部
// (claude 的模式切换行)被键盘遮住。把可视高度同步到 --vvh,布局随键盘收缩,
// 快捷键条就稳稳贴在键盘上方。
const vv = window.visualViewport;
const appEl = $('#app');
let settleTimer;
// 让 #app 精确贴合「可视视口」:键盘弹出时高度收缩到键盘上沿;Safari 为露出光标而把
// 整页上移时,用反向 transform 跟随,使内容纹丝不动 —— 不会被顶飞、也不会打字时上滑。
function applyViewport() {
  if (!vv) return;
  appEl.style.height = vv.height + 'px';
  appEl.style.transform = `translate(${vv.offsetLeft}px, ${vv.offsetTop}px)`;
}
// 轮询直到可视高度稳定(键盘动画结束)再 fit。iOS 常只发一次 resize,固定延时会按
// 动画中途(偏高)的尺寸算行数 → 底部两三行溢到键盘条/键盘下看不到,且 claude 输入行
// 落到可视区外,Safari 又会上滚去露光标(就是打字时"跳回上面")。稳定后 fit 才彻底解决。
function settleFit() {
  clearTimeout(settleTimer);
  let last = -1, stable = 0;
  const tick = () => {
    const h = vv ? vv.height : 0;
    if (Math.abs(h - last) < 2) stable++; else { stable = 0; last = h; }
    if (stable >= 3) { // 连续 ~240ms 没变 = 键盘停稳
      if (term && current && fit && $('#term').clientHeight > 0) { fit.fit(); sendResize(); term.scrollToBottom(); }
      return;
    }
    settleTimer = setTimeout(tick, 80);
  };
  tick();
}
if (vv) {
  vv.addEventListener('resize', () => { applyViewport(); settleFit(); });
  vv.addEventListener('scroll', applyViewport); // 纯滚动只挪位,不重排,免抖动
  applyViewport();
}

// --- 移动端快捷键条 ---------------------------------------------------------
async function doPaste() {
  try { const t = await navigator.clipboard.readText(); if (t && term) term.paste(t); }
  catch { /* 剪贴板不可用(需 HTTPS / 用户授权) */ }
}
$('#keybar').addEventListener('pointerdown', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  e.preventDefault(); // 不让终端失焦,软键盘保持弹出
  const k = b.dataset.k;
  if (k === 'paste') { doPaste().finally(() => term && term.focus()); return; }
  const seq = { esc: '\x1b', tab: '\t', stab: '\x1b[Z' }[k]; // ⇧Tab = CSI Z(反向制表)
  if (seq && ws && ws.readyState === WebSocket.OPEN) ws.send(new TextEncoder().encode(seq));
  if (term) term.focus();
});

let term, fit, ws, current = null, currentMachine = null, reconnectTimer;

function isCopyShortcut(e) {
  return e.ctrlKey && e.shiftKey && !e.altKey && !e.metaKey && (e.code === 'KeyC' || e.key.toLowerCase() === 'c');
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  ta.style.top = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } finally { ta.remove(); }
}

async function copyTermSelection() {
  if (!term || !term.hasSelection()) return false;
  const text = term.getSelection();
  try { await navigator.clipboard.writeText(text); }
  catch { fallbackCopy(text); }
  term.focus();
  return true;
}

function handleTerminalCopyShortcut(e) {
  if (!isCopyShortcut(e) || !term || !current) return false;
  e.preventDefault();
  e.stopPropagation();
  if (typeof e.stopImmediatePropagation === 'function') e.stopImmediatePropagation();
  copyTermSelection();
  return true;
}

document.addEventListener('keydown', (e) => {
  if (!term || !current || !$("#term").contains(document.activeElement)) return;
  handleTerminalCopyShortcut(e);
}, true);

async function api(path, opts) {
  const res = await fetch(path, opts);
  if (res.status === 401) { location.href = '/login.html'; throw new Error('unauth'); }
  return res;
}

async function loadMe() {
  const { user } = await (await api('/api/me')).json();
  $('#who').textContent = user.via === 'none' ? '(免鉴权)' : user.name;
}

async function loadMachines() {
  const { agents } = await (await api('/api/agents')).json();
  const box = $('#machines');
  box.innerHTML = '';
  if (!agents.length) { box.innerHTML = '<div class="empty">还没有机器,点上方「+ 添加」</div>'; return; }
  for (const m of agents) {
    const el = document.createElement('div');
    el.className = 'item' + (m.online ? ' online' : '') + (m.id === currentMachine ? ' sel' : '');
    el.innerHTML = `<span class="kill" data-id="${m.id}" title="吊销">✕</span>` +
      `<span class="dot"></span>${m.name}` +
      `<div class="meta">${m.online ? m.sessions + ' 个会话' : '离线'}</div>`;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('kill')) return;
      selectMachine(m.id);
    });
    el.querySelector('.kill').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`吊销机器「${m.name}」?该机将被踢下线。`)) return;
      await api('/api/agents/' + m.id, { method: 'DELETE' });
      if (currentMachine === m.id) { closeTerm(); currentMachine = null; $('#list').innerHTML = '<div class="empty">← 先选一台机器</div>'; }
      loadMachines();
    });
    box.appendChild(el);
  }
}

function selectMachine(id) {
  currentMachine = id;
  loadMachines();
  loadSessions();
}

async function loadSessions() {
  const list = $('#list');
  if (!currentMachine) { list.innerHTML = '<div class="empty">← 先选一台机器</div>'; return; }
  const res = await api('/api/agents/' + currentMachine + '/sessions');
  if (!res.ok) { list.innerHTML = '<div class="empty">机器离线</div>'; return; }
  const { sessions } = await res.json();
  list.innerHTML = '';
  if (!sessions.length) { list.innerHTML = '<div class="empty">无会话,点「+ 新建」</div>'; return; }
  for (const s of sessions) {
    const el = document.createElement('div');
    el.className = 'item' + (s.id === current ? ' active' : '');
    el.innerHTML = `<span class="kill" data-id="${s.id}">✕</span>` +
      `<span class="ren" data-id="${s.id}" title="重命名">✎</span>` +
      `${s.name}<div class="meta">${s.clients} 个连接 · ${s.cols}×${s.rows}${s.exited ? ' · 已退出' : ''}</div>`;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains("kill") || e.target.classList.contains("ren")) return;
      openSession(s.id);
    });
    el.querySelector(".ren").addEventListener("click", async (e) => {
      e.stopPropagation();
      const name = prompt("窗口新名字(留空恢复原名):", s.name);
      if (name == null) return;
      const res = await api("/api/agents/" + currentMachine + "/sessions/" + s.id, {
        method: "PATCH", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name.trim() }),
      });
      if (!res.ok) return alert("重命名失败:机器可能离线");
      loadSessions();
    });
    el.querySelector('.kill').addEventListener('click', async (e) => {
      e.stopPropagation();
      await api('/api/agents/' + currentMachine + '/sessions/' + s.id, { method: 'DELETE' });
      if (current === s.id) closeTerm();
      loadSessions();
    });
    list.appendChild(el);
  }
}

function ensureTerm() {
  if (term) return;
  term = new Terminal({
    cursorBlink: true, fontSize: 14, scrollback: 10000,
    // Include Windows monospace fonts (Consolas / Cascadia) — the Apple ones don't
    // exist there, so xterm fell back to a font with wrong glyph metrics → garbled
    // display and sluggish render. Consolas ships on every Windows.
    fontFamily: "ui-monospace, SFMono-Regular, Menlo, Consolas, 'Cascadia Mono', 'Courier New', monospace",
    theme: { background: '#1e1e1e' },
  });
  fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open($('#term'));
  term.attachCustomKeyEventHandler((e) => !handleTerminalCopyShortcut(e));
  // 关掉 iOS 的自动纠正 / 联想(QuickType)条 —— 打字时它忽隐忽现地改变可视视口
  // 高度,会把终端反复重排、往上跳一大段,用户得手动滑回底部。
  const ta = term.textarea;
  if (ta) {
    ta.setAttribute('autocorrect', 'off');
    ta.setAttribute('autocapitalize', 'off');
    ta.setAttribute('autocomplete', 'off');
    ta.setAttribute('spellcheck', 'false');
  }
  // Canvas renderer: much faster than the DOM renderer for a large scrollback (so
  // typing stays smooth), and — unlike the WebGL renderer — it keeps the scroll
  // viewport in sync after a session switch. WebGL left scrolling dead until a
  // keystroke forced a repaint. Falls back to the DOM renderer if it can't load.
  try {
    term.loadAddon(new CanvasAddon.CanvasAddon());
  } catch (e) { /* no Canvas addon → stay on the DOM renderer */ }
  term.onData((d) => { if (ws && ws.readyState === WebSocket.OPEN) ws.send(new TextEncoder().encode(d)); });
  // Re-fit whenever the terminal pane actually changes size (sidebar toggle, split,
  // rotate, window resize) — more reliable than the window 'resize' event.
  let pendingFit = false;
  const ro = new ResizeObserver(() => {
    if (pendingFit) return;
    pendingFit = true;
    requestAnimationFrame(() => {
      pendingFit = false;
      if (current && $('#term').clientHeight > 0) { fit.fit(); sendResize(); }
    });
  });
  ro.observe($('#term'));

  // Full-screen TUIs (claude / vim / less) use the alternate buffer, which has no
  // scrollback — so there, translate the wheel into arrow keys for the program.
  // In the normal buffer let xterm's own viewport handle the wheel (works fine).
  $('#term').addEventListener('wheel', (e) => {
    if (!term || term.buffer.active.type !== 'alternate') return;
    const seq = e.deltaY > 0 ? '\x1b[B' : '\x1b[A'; // down / up arrow
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(new TextEncoder().encode(seq.repeat(3)));
    e.preventDefault();
  }, { passive: false });

  // 触屏(手机)没有 wheel,xterm 也不自带触摸滚动 —— 两种 buffer 都自己接管:
  //   · alternate buffer(claude/vim 等全屏 TUI):把上下滑动转成方向键发给程序;
  //   · normal buffer(普通 shell 回看):滚 xterm 自己的 scrollback。
  let touchLastY = null, touchResidual = 0;
  const STEP = 16; // 每滑动 16px 算一行
  $('#term').addEventListener('touchstart', (e) => {
    if (!term) { touchLastY = null; return; }
    touchLastY = e.touches[0].clientY; touchResidual = 0;
  }, { passive: true });
  $('#term').addEventListener('touchmove', (e) => {
    if (touchLastY == null || !term) return;
    const y = e.touches[0].clientY;
    touchResidual += y - touchLastY; touchLastY = y;
    let up = 0, down = 0;
    while (touchResidual >= STEP)  { up++;   touchResidual -= STEP; } // 下拉 → 看更早 → 向上
    while (touchResidual <= -STEP) { down++; touchResidual += STEP; }
    const net = down - up; // <0 向上(看更早),>0 向下
    if (net !== 0) {
      if (term.buffer.active.type === 'alternate') {
        const seq = net > 0 ? '\x1b[B' : '\x1b[A';
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(new TextEncoder().encode(seq.repeat(Math.abs(net))));
      } else {
        term.scrollLines(net); // 普通 buffer 滚回看
      }
    }
    e.preventDefault(); // 阻止页面橡皮筋
  }, { passive: false });
  $('#term').addEventListener('touchend', () => { touchLastY = null; }, { passive: true });
}

function sendResize() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
  }
}

function closeTerm() {
  clearTimeout(reconnectTimer);
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  current = null;
  $('#term').style.display = 'none';
  $('#empty').style.display = 'grid';
  document.body.classList.remove('term-open');
  setStatus('空闲', '');
}

function openSession(id) {
  if (current === id && ws && ws.readyState === WebSocket.OPEN) return;
  closeTerm();
  current = id;
  // Show the pane BEFORE creating the terminal: term.open()/WebGL must initialize on
  // a visible, sized container, or the viewport mis-measures (scroll dead, bottom
  // clipped) until something forces a reflow.
  $('#empty').style.display = 'none';
  $('#term').style.display = 'block';
  document.body.classList.add('term-open');
  ensureTerm();
  term.reset(); // full reset, not clear() — clear() keeps the last line and leaks it into the next session
  // The pane just switched to display:block, so its size isn't settled yet. Fit on
  // the next frame; fitting now reads a wrong size → rows/cols off (bottom content
  // clipped) and the viewport mis-sized (scroll/click dead until you type).
  requestAnimationFrame(() => { fit.fit(); term.focus(); });
  if (isMobile()) closeDrawer(); // 选了会话就收起抽屉,露出终端
  loadSessions();
  connect();
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?agent=${currentMachine}&session=${current}`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => { setStatus('● 已同步', 'ok'); fit.fit(); sendResize(); term.focus(); };
  ws.onmessage = (ev) => {
    if (typeof ev.data === 'string') {
      try {
        const m = JSON.parse(ev.data);
        if (m.type === 'exit') setStatus(`shell 已退出 (${m.code})`, 'bad');
        if (m.type === 'error') setStatus(m.message, 'bad');
        return;
      } catch { term.write(ev.data); return; }
    }
    term.write(new Uint8Array(ev.data));
  };
  ws.onclose = () => {
    if (current) { setStatus('重连中…', 'bad'); reconnectTimer = setTimeout(connect, 1000); }
  };
  ws.onerror = () => ws.close();
}

$('#new').addEventListener('click', async () => {
  if (!currentMachine) { alert('请先选择一台机器'); return; }
  const name = prompt('会话名称(可选):') || undefined;
  const res = await api('/api/agents/' + currentMachine + '/sessions', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  if (!res.ok) { alert('新建失败:机器可能离线'); return; }
  const { session } = await res.json();
  await loadSessions();
  openSession(session.id);
});

$('#addMachine').addEventListener('click', async () => {
  const res = await api('/api/pair/new', { method: 'POST' });
  if (!res.ok) { alert('生成配对码失败'); return; }
  const { code, expiresInSec } = await res.json();
  const hubUrl = location.origin;
  prompt(
    `在新电脑上运行(${Math.round(expiresInSec / 60)} 分钟内有效):\n\n` +
    `HUB_URL=${hubUrl} node agent.js pair ${code}\n\n配对码:`,
    code,
  );
});

$('#logout').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  location.href = '/login.html';
});

// --- 用量 -------------------------------------------------------------------
function barColor(p) { return p >= 85 ? '#f0716e' : p >= 60 ? '#e9a23b' : '#3ddc84'; }
function fmtReset(iso) {
  if (!iso) return '';
  const ms = new Date(iso) - Date.now();
  if (ms <= 0) return '即将重置';
  const totalM = Math.floor(ms / 60000);
  const d = Math.floor(totalM / 1440), h = Math.floor((totalM % 1440) / 60), m = totalM % 60;
  if (d) return h ? `${d}d${h}h` : `${d}d`;
  return h ? `${h}h${m}m` : `${m}m`;
}
function bar(label, w) {
  if (!w || typeof w.usedPercent !== 'number') {
    return `<div class="bar"><span class="lbl">${label}</span><span class="track"></span><span class="pct">–</span><span class="rst"></span></div>`;
  }
  const p = Math.max(0, Math.min(100, w.usedPercent));
  const rst = w.resetsAt ? fmtReset(w.resetsAt) : '';
  return `<div class="bar"><span class="lbl">${label}</span>` +
    `<span class="track"><span class="fill" style="width:${p}%;background:${barColor(p)}"></span></span>` +
    `<span class="pct">${p.toFixed(0)}%</span>` +
    `<span class="rst" title="窗口重置倒计时">${rst}</span></div>`;
}
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
async function loadUsage(force) {
  const list = $('#usageList');
  let data;
  try {
    const res = force
      ? await api('/api/usage/refresh', { method: 'POST' })
      : await api('/api/usage');
    if (!res.ok) { list.innerHTML = `<div class="empty">用量不可用 (${res.status})</div>`; return; }
    data = await res.json();
  } catch { list.innerHTML = '<div class="empty">用量加载失败</div>'; return; }
  if (!data.accounts || !data.accounts.length) { list.innerHTML = '<div class="empty">无账号,点上方「+ 账号」添加</div>'; return; }
  list.innerHTML = data.accounts.map((a) => {
    const u = a.usage || {};
    const five = u.fiveHour, seven = u.sevenDay, sonnet = u.sevenDaySonnet;
    const err = a.lastError;
    const plan = a.subscriptionType ? `<span class="plan">${esc(a.subscriptionType)}</span>` : '';
    const tag = err
      ? `<span class="warn" title="${esc(err)}">⚠ ${esc(String(err).slice(0, 16))}</span>`
      : '';
    return `<div class="acct"><div class="nm">` +
      `<span>${esc(a.name)} ${plan}</span>` +
      `<span>${tag}` +
      `<span class="ren" data-id="${a.id}" data-name="${esc(a.name)}" title="重命名">✎</span>` +
      `<span class="del" data-id="${a.id}" title="删除账号">✕</span></span></div>` +
      bar('5h', five) + bar('7d', seven) + (sonnet ? bar('7dS', sonnet) : '') + `</div>`;
  }).join('');
}
$('#usageRefresh').addEventListener('click', () => {
  const b = $('#usageRefresh');
  if (b.dataset.busy) return;
  b.dataset.busy = '1'; b.style.opacity = .4;
  loadUsage(true).finally(() => { delete b.dataset.busy; b.style.opacity = 1; });
});

// 重命名 / 删除账号(事件委托)
$('#usageList').addEventListener('click', async (e) => {
  const ren = e.target.closest('.ren');
  if (ren) {
    const cur = ren.dataset.name || '';
    const name = prompt('账号新名字:', cur);
    if (name == null) return;
    const v = name.trim();
    if (!v || v === cur) return;
    const res = await api('/api/usage/accounts/' + ren.dataset.id, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: v }),
    });
    if (!res.ok) { const j = await res.json().catch(() => ({})); return alert('重命名失败:' + (j.error || res.status)); }
    loadUsage();
    return;
  }
  const del = e.target.closest('.del');
  if (!del) return;
  if (!confirm('删除这个 Claude 账号?(会移除其凭证)')) return;
  await api('/api/usage/accounts/' + del.dataset.id, { method: 'DELETE' });
  loadUsage();
});

// 添加账号:OAuth 浏览器授权,或粘贴令牌/credentials.json 导入
async function addAccount() {
  const useOAuth = confirm('点「确定」用浏览器授权登录(OAuth);\n点「取消」改为粘贴令牌 / credentials.json 导入(更稳)。');
  try {
    if (useOAuth) {
      const { pendingId, authorizeUrl } = await (await api('/api/usage/accounts/login/start', { method: 'POST' })).json();
      window.open(authorizeUrl, '_blank', 'noopener');
      const code = prompt('已打开授权页。授权后把页面显示的 code(形如 CODE#STATE)粘贴回来:');
      if (!code) return;
      const name = prompt('给这个账号起个名(可选):') || undefined;
      const res = await api('/api/usage/accounts/login/complete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pendingId, code, name }),
      });
      const j = await res.json().catch(() => ({}));
      if (!res.ok) return alert('添加失败:' + (j.error || res.status));
    } else {
      const raw = prompt('粘贴 setup-token(sk-ant-oat...)或 credentials.json 内容:');
      if (!raw) return;
      const name = prompt('给这个账号起个名(可选):') || undefined;
      const res = await api('/api/usage/accounts/import', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ raw, name }),
      });
      const j = await res.json().catch(() => ({}));
      if (!res.ok) return alert('添加失败:' + (j.error || res.status));
    }
    loadUsage(true);
  } catch { alert('添加账号出错'); }
}
$('#addAcct').addEventListener('click', addAccount);

(async function init() {
  await loadMe();
  await loadMachines();
  loadUsage();
  if (isMobile()) openDrawer(); // 手机端首屏先把抽屉展开,方便选机器/会话
  setInterval(() => { if (document.visibilityState === 'visible') { loadMachines(); loadSessions(); } }, 5000);
  setInterval(() => { if (document.visibilityState === 'visible') loadUsage(); }, 60000);
})();
</script>

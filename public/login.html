<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>zsh-web · 登录</title>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; color: #e7e9ee;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "PingFang SC", sans-serif;
    background: #090b10; }
  body { position: relative; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(40% 50% at 18% 12%, rgba(72,116,255,.12), transparent 70%),
      radial-gradient(44% 46% at 84% 18%, rgba(61,220,160,.07), transparent 70%),
      radial-gradient(52% 52% at 72% 94%, rgba(150,92,255,.10), transparent 72%); }
  .wrap { position: relative; z-index: 1; height: 100%; display: grid; place-items: center; padding: 20px; box-sizing: border-box; }
  .card { width: 320px; max-width: 100%; padding: 34px 30px; border-radius: 22px; text-align: center;
    background: rgba(22,24,31,.55);
    -webkit-backdrop-filter: blur(30px) saturate(180%); backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid rgba(255,255,255,.1);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 20px 60px rgba(0,0,0,.5); }
  .logo { width: 58px; height: 58px; margin: 0 auto 16px; border-radius: 16px;
    display: grid; place-items: center; font-size: 28px; color: #e9fff4;
    background: linear-gradient(180deg, #33a266, #25814c);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 6px 16px rgba(0,0,0,.3); }
  h1 { font-size: 21px; font-weight: 700; margin: 0 0 4px; letter-spacing: .5px; }
  .sub { font-size: 12.5px; color: #8b909b; margin: 0 0 24px; }
  .oauth { display: block; width: 100%; box-sizing: border-box; padding: 12px; border-radius: 13px;
    color: #e9fff4; font: inherit; font-weight: 700; cursor: pointer; text-decoration: none;
    background: linear-gradient(180deg, #33a266, #25814c);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 4px 12px rgba(0,0,0,.3);
    transition: transform .16s ease, box-shadow .16s ease, background .16s ease; }
  .oauth:hover { transform: translateY(-1px); background: linear-gradient(180deg, #39ad6f, #298c54);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 7px 18px rgba(0,0,0,.36); }
  .err { color: #f29292; font-size: 13px; min-height: 18px; margin-top: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">⌘</div>
    <h1>zsh-web</h1>
    <p class="sub">终端 · Claude 用量</p>
    <a class="oauth" href="/auth/oauth2/login">使用群晖账号登录</a>
  </div>
</div>
</body>
</html>
